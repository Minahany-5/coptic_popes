    <!-- Typewriter -->
    <script>
        const phrases = [
            "مهرجان الكرازه المرقسية 2026",
            "كنيسه السيده العذراء و الشهيد ماري جرجس بالسد العالي",
            "بطاركه الكنيسة القبطيه الارثوذكسيه"
        ];
        const el = document.getElementById('typewriter');
        const typeSpeed = 80, eraseSpeed = 40, pauseAfterType = 2000, pauseAfterErase = 400;
        let phraseIndex = 0, charIndex = 0, isErasing = false;
        function tick() {
            const current = phrases[phraseIndex];
            if (!isErasing) {
                charIndex++;
                el.textContent = current.substring(0, charIndex);
                if (charIndex === current.length) { isErasing = true; setTimeout(tick, pauseAfterType); return; }
                setTimeout(tick, typeSpeed);
            } else {
                charIndex--;
                el.textContent = current.substring(0, charIndex);
                if (charIndex === 0) { isErasing = false; phraseIndex = (phraseIndex + 1) % phrases.length; setTimeout(tick, pauseAfterErase); return; }
                setTimeout(tick, eraseSpeed);
            }
        }
        setTimeout(tick, 800);
    </script>

            quote: "«الكنيسة بيت لكل أبنائها»",

    const BATCH_SIZE = 20;
    let allPopes = [...POPES_DATA];
    let displayedCount = 0;
    let currentFilter = 'all';

    function getEraLabel(century) {
        if (century === 1) return 'القرن الأول';
        if (century <= 5) return `القرن ${toArabicNumerals(century)}`;
        if (century <= 10) return `القرن ${toArabicNumerals(century)}`;
        return `القرن ${toArabicNumerals(century)}`;
    }

    function toArabicNumerals(n) {
        const map = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
        return String(n).replace(/[0-9]/g, d => map[d]);
    }

    function getFilteredPopes() {
        if (currentFilter === 'all') return allPopes;
        const ranges = {
            '1': c => c === 1,
            '2-5': c => c >= 2 && c <= 5,
            '6-10': c => c >= 6 && c <= 10,
            '11-15': c => c >= 11 && c <= 15,
            '16-20': c => c >= 16 && c <= 20,
        };
        return allPopes.filter(p => ranges[currentFilter](p[4]));
    }

    function createPopeCard(pope) {
        const [num, name, enthrone, death, era] = pope;
        const hasDetails = POPE_DETAILS[num];
        const isActive = death === "الآن";

        const card = document.createElement('div');
        card.className = 'timeline-item';
        card.setAttribute('data-pope', num);
        card.setAttribute('data-era', era);

        const side = num % 2 === 0 ? 'right' : 'left';
        card.classList.add(`timeline-${side}`);

        card.innerHTML = `
            <div class="timeline-node" title="${name}">
                <span class="pope-num">${toArabicNumerals(num)}</span>
            </div>
            <div class="timeline-card ${isActive ? 'pope-active' : ''}" onclick="openPopeModal(${num})">
                <div class="pope-card-inner">
                    <div class="pope-number-badge">${toArabicNumerals(num)}</div>
                    <h3 class="pope-name">${name}</h3>
                    <div class="pope-dates">
                        <span class="pope-date-item"><i class="fas fa-crown"></i> ${enthrone}</span>
                        <span class="pope-date-item"><i class="fas fa-cross"></i> ${death}</span>
                    </div>
                    <span class="pope-era-tag">${getEraLabel(era)}</span>
                    ${hasDetails ? '<span class="pope-detail-hint"><i class="fas fa-book-open"></i> تفاصيل</span>' : ''}
                </div>
                <div class="pope-hover-overlay">
                    <div class="hover-cross">✝</div>
                    <p class="hover-name">${name}</p>
                    <p class="hover-num">البابا رقم ${toArabicNumerals(num)}</p>
                    ${hasDetails ? `<p class="hover-quote">${POPE_DETAILS[num].quote}</p>` : ''}
                    <p class="hover-cta">انقر للتفاصيل الكاملة</p>
                </div>
            </div>
        `;
        return card;
    }

    function renderPopes(reset = false) {
        const container = document.getElementById('timeline-items');
        if (reset) {
            container.innerHTML = '';
            displayedCount = 0;
        }
        const filtered = getFilteredPopes();
        const batch = filtered.slice(displayedCount, displayedCount + BATCH_SIZE);
        batch.forEach((pope, idx) => {
            const card = createPopeCard(pope);
            card.style.animationDelay = `${idx * 60}ms`;
            container.appendChild(card);
        });
        displayedCount += batch.length;

        const loadMoreWrap = document.getElementById('load-more-wrap');
        loadMoreWrap.style.display = displayedCount < filtered.length ? 'flex' : 'none';
    }

    function loadMorePopes() {
        renderPopes(false);
    }

    function initPopes() {
        document.getElementById('popes-loading').style.display = 'none';
        document.getElementById('timeline-container').style.display = 'block';
        renderPopes(true);
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.era;
            renderPopes(true);
        });
    });

    // Search
    function searchPope(e) {
        if (e) e.preventDefault();
        const q = document.getElementById('popeSearch').value.trim();
        if (!q) return;
        const found = allPopes.find(p => p[1].includes(q) || String(p[0]) === q);
        if (found) {
            currentFilter = 'all';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-era="all"]').classList.add('active');
            document.getElementById('timeline-items').innerHTML = '';
            displayedCount = 0;
            // Show all then scroll
            while (displayedCount < allPopes.length) renderPopes(false);
            setTimeout(() => {
                const el = document.querySelector(`[data-pope="${found[0]}"]`);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('pope-highlight');
                    setTimeout(() => el.classList.remove('pope-highlight'), 3000);
                }
            }, 300);
        } else {
            alert('لم يتم العثور على هذا البطريرك. جرب اسماً مختلفاً.');
        }
    }

    document.getElementById('popeSearch').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchPope(null);
    });

    // Modal
    function openPopeModal(num) {
        const pope = allPopes.find(p => p[0] === num);
        if (!pope) return;
        const [n, name, enthrone, death, era] = pope;
        const details = POPE_DETAILS[num];
        const modal = document.getElementById('pope-modal');
        const content = document.getElementById('pope-modal-content');

        content.innerHTML = `
            <div class="modal-pope-header">
                <div class="modal-cross-bg">✝</div>
                <span class="modal-pope-num">${toArabicNumerals(n)}</span>
                <h2 class="modal-pope-name">${name}</h2>
                <div class="modal-dates">
                    <span><i class="fas fa-crown"></i> تولى الكرسي: ${enthrone}</span>
                    <span><i class="fas fa-cross"></i> الانتقال: ${death}</span>
                </div>
            </div>
            <div class="modal-body-content">
                ${details ? `
                    <div class="modal-section">
                        <h4><i class="fas fa-scroll"></i> السيرة المختصرة</h4>
                        <p>${details.bio}</p>
                    </div>
                    <div class="modal-section">
                        <h4><i class="fas fa-star"></i> أبرز إنجازاته</h4>
                        <ul class="modal-achievements">
                            ${details.achievements.map(a => `<li><i class="fas fa-check-circle"></i> ${a}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="modal-section modal-quote-section">
                        <i class="fas fa-quote-right quote-icon"></i>
                        <blockquote>${details.quote}</blockquote>
                    </div>
                    <div class="modal-section modal-source-section">
                        <p class="modal-source-text"><i class="fas fa-link"></i> ${details.source}</p>
                    </div>
                ` : `
                    <div class="modal-section">
                        <p class="modal-no-details">
                            <i class="fas fa-book"></i>
                            تُعدّ المعلومات التفصيلية عن هذا البطريرك من التراث المحفوظ في المخطوطات القبطية القديمة.
                            <br><br>
                            <strong>تولى الكرسي:</strong> ${enthrone} &nbsp;|&nbsp; <strong>الانتقال:</strong> ${death}
                            <br>
                            <strong>الحقبة:</strong> ${getEraLabel(era)}
                        </p>
                    </div>
                `}
            </div>
        `;

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closePoperModal() {
        document.getElementById('pope-modal').classList.remove('active');
        document.body.style.overflow = '';
    }

    function closeModal(e) {
        if (e.target === document.getElementById('pope-modal')) closePoperModal();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closePoperModal();
    });

    // Init on load
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(initPopes, 600);
    });
    </script>

</body>
